name: Dark Mysteries Blog Writer

on:
  schedule:
    - cron: '0 * * * *'    # Every hour at :00
    - cron: '30 * * * *'   # Every hour at :30
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client schedule

      - name: Write token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Init used topics
        run: |
          if [ -f dark_used_topics.json ]; then
            echo "exists"
          else
            echo "[]" > dark_used_topics.json
          fi

      - name: Run Dark Mysteries Blog Writer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.DARK_BLOGGER_BLOG_ID }}
        run: python dark_mysteries_blog.py --once
