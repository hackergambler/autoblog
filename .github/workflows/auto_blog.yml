name: Daily Tips - Human Mode

on:
  schedule:
    # Runs at 2:00 AM and 2:00 PM UTC
    - cron: '0 2,14 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Random Human Delay
        run: |
          # Wait between 1 and 45 minutes randomly
          DELAY=$((1 + RANDOM % 45))
          echo "Waiting $DELAY minutes to look human..."
          sleep $((DELAY * 60))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-api-python-client

      - name: Rebuild token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Run Daily Tips Blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        run: python auto_blog_writer_FREE.py --once
