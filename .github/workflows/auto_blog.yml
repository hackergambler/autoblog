name: Auto Blog Writer

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour automatically
  workflow_dispatch:        # Also lets you run it manually anytime

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Write token.json from secret
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Write credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Write used_topics.json if exists
        run: |
          if [ -f used_topics.json ]; then
            echo "used_topics.json already exists"
          else
            echo "[]" > used_topics.json
          fi

      - name: Run Auto Blog Writer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        run: python auto_blog_writer_FREE.py --once
