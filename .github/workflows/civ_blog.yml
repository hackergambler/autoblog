name: Civilization Blog

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: civilization-blog
  cancel-in-progress: false

jobs:
  publish-civilization-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create and validate token.json from secret
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          python - <<'PY'
          import os
          import json
          import sys
          from pathlib import Path

          raw = os.environ.get("GOOGLE_TOKEN_JSON", "").strip()
          if not raw:
              print("ERROR: GOOGLE_TOKEN_JSON secret is empty")
              sys.exit(1)

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print("ERROR: GOOGLE_TOKEN_JSON is not valid JSON")
              print(e)
              sys.exit(1)

          required_keys = ["token", "refresh_token", "token_uri", "client_id", "client_secret"]
          missing = [k for k in required_keys if k not in data]
          if missing:
              print(f"ERROR: GOOGLE_TOKEN_JSON is missing keys: {missing}")
              sys.exit(1)

          Path("token.json").write_text(
              json.dumps(data, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )
          print("token.json created successfully")
          PY

      - name: Run civilization blog script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CIV_BLOGGER_BLOG_ID: ${{ secrets.CIV_BLOGGER_BLOG_ID }}
        run: |
          python civilization_blog.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add civ_topics.json civ_history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update civilization topics/state [skip ci]"
            git push
          fi
