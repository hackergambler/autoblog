name: Civilization - Human Mode

on:
  schedule:
    # Runs at 4:00 AM and 4:00 PM UTC
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Random Human Delay
        run: |
          # Wait between 1 and 60 minutes randomly
          DELAY=$((1 + RANDOM % 60))
          echo "Waiting $DELAY minutes to look human..."
          sleep $((DELAY * 60))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-api-python-client

      - name: Rebuild token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Run Civilization Blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CIV_BLOGGER_BLOG_ID: ${{ secrets.CIV_BLOGGER_BLOG_ID }}
        run: python civilization_blog.py --once
