name: Civilization - Human Mode

on:
  schedule:
    # Runs at 4:00 AM and 4:00 PM UTC (9:30 AM & 9:30 PM IST)
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Random Human Delay
        run: |
          DELAY=$((1 + RANDOM % 60))
          echo "Waiting $DELAY minutes..."
          sleep $((DELAY * 60))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-api-python-client

      - name: Rebuild token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Run Civilization Blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CIV_BLOGGER_BLOG_ID: ${{ secrets.CIV_BLOGGER_BLOG_ID }}
        run: python civilization_blog.py

      - name: Sync and Commit History
        run: |
          git config --global user.name "MYRQ-Bot"
          git config --global user.email "bot@myrqai.com"
          git add civ_history.json
          git pull --rebase origin main
          git commit -m "Update civilization history [skip ci]" || echo "No changes to commit"
          git push origin main
