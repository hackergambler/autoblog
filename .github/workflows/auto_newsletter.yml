name: Auto Newsletter Sender

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST (2:30 UTC) - Morning edition
    - cron: '30 13 * * *'  # 7:00 PM IST (13:30 UTC) - Evening edition
  workflow_dispatch:
    inputs:
      edition:
        description: 'Which edition to send?'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq mailchimp-marketing schedule

      - name: Determine edition (morning or evening)
        id: edition
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "EDITION=${{ github.event.inputs.edition }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt "12" ]; then
              echo "EDITION=morning" >> $GITHUB_ENV
            else
              echo "EDITION=evening" >> $GITHUB_ENV
            fi
          fi

      - name: Send newsletter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER: ${{ secrets.MAILCHIMP_SERVER }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
        run: python auto_newsletter_FREE.py --${{ env.EDITION }}
