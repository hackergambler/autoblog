name: Dark Mysteries - Human Mode

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Random Human Delay
        run: |
          DELAY=$((1 + RANDOM % 50))
          sleep $((DELAY * 60))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-api-python-client

      - name: Rebuild token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Run Dark Mysteries Blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DARK_BLOGGER_BLOG_ID: ${{ secrets.DARK_BLOGGER_BLOG_ID }}
        run: python dark_mysteries_blog.py

      - name: Sync and Commit History
        run: |
          git config --global user.name "MYRQ-Bot"
          git config --global user.email "bot@myrqai.com"
          git add dark_history.json
          git commit -m "Update dark mysteries history [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
