name: Dark Mysteries Blog

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dark-mysteries-blog
  cancel-in-progress: false

jobs:
  publish-dark-blog:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DARK_BLOGGER_BLOG_ID: ${{ secrets.DARK_BLOGGER_BLOG_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      GOOGLE_TOKEN_URI: https://oauth2.googleapis.com/token

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          python - <<'PY'
          import os
          import sys

          required = [
              "GROQ_API_KEY",
              "DARK_BLOGGER_BLOG_ID",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "GOOGLE_REFRESH_TOKEN",
          ]

          missing = [k for k in required if not os.getenv(k, "").strip()]
          if missing:
              print(f"ERROR: Missing required secrets: {', '.join(missing)}")
              sys.exit(1)

          print("All required secrets are present.")
          PY

      - name: Random human-like delay
        run: |
          DELAY=$((900 + RANDOM % 6300))
          echo "Sleeping for $DELAY seconds before posting..."
          sleep "$DELAY"

      - name: Run dark blog script
        run: |
          python dark_mysteries_blog.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dark_topics_2000.json dark_state.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dark topics/state [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
