name: Dark Mysteries Blog

on:
  schedule:
    - cron: "0 6,18 * * *"   # runs 2 times a day: 06:00 UTC and 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dark-mysteries-blog
  cancel-in-progress: false

jobs:
  publish-dark-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create token.json from secret
        run: |
          cat <<'EOF' > token.json
          ${{ secrets.BLOGGER_TOKEN_JSON }}
          EOF

      - name: Run dark mysteries blog script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DARK_BLOGGER_BLOG_ID: ${{ secrets.DARK_BLOGGER_BLOG_ID }}
        run: |
          python dark_mysteries_blog.py

      - name: Commit updated topic/state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dark_topics_2000.json dark_state.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dark topics/state [skip ci]"
            git push
          fi
