name: Dark Mysteries Blog — Auto Post

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-api-python-client schedule

      - name: Write token.json from secret
        env:
          TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python3 -c "import os; open('token.json','w').write(os.environ['TOKEN_JSON'])"

      - name: Verify token.json
        run: python3 -c "import json; json.load(open('token.json')); print('✅ token.json is valid')"

      - name: Run Dark Mysteries blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.DARK_BLOGGER_BLOG_ID }}
        run: python dark_mysteries_blog.py --once
