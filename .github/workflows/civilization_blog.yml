name: Civilization Blog Writer

on:
  schedule:
    - cron: '0 * * * *'    # Top of every hour
    - cron: '30 * * * *'   # Every 30 minutes past the hour
  workflow_dispatch:        # Manual trigger anytime

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client schedule

      - name: Write token.json from secret
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Write credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Write used topics if exists
        run: |
          if [ -f civilization_used_topics.json ]; then
            echo "Already exists"
          else
            echo "[]" > civilization_used_topics.json
          fi

      - name: Run Civilization Blog Writer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CIVILIZATION_BLOG_ID: ${{ secrets.CIVILIZATION_BLOG_ID }}
        run: python civilization_blog.py --once
